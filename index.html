<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Core / Support Bingo</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="theme-color" content="#0b1020" />
</head>
<body>
  <div class="bg"></div>

  <main class="app">
    <header class="header">
      <div class="title">
        <h1>Core / Support Bingo</h1>
        <p class="subtitle">Daily seed: <span id="todayLabel">—</span></p>
      </div>

      <div class="actions">
        <button id="resetBtn" class="btn ghost" type="button" title="Czyści zaznaczenia dla tego zestawu">Reset</button>
        <label class="toggle" title="Jeśli przeglądarka pozwoli, otworzy film automatycznie po bingo">
          <input id="autoOpenToggle" type="checkbox" />
          <span>Auto-otwórz 🎬</span>
        </label>
      </div>
    </header>

    <section class="card">
      <div class="tabs" role="tablist" aria-label="Zestawy bingo">
        <button class="tab active" data-board="0" role="tab" aria-selected="true">Zestaw 1</button>
        <button class="tab" data-board="1" role="tab" aria-selected="false">Zestaw 2</button>
        <button class="tab" data-board="2" role="tab" aria-selected="false">Zestaw 3</button>
      </div>

      <div class="gridWrap">
        <div id="grid" class="grid" aria-label="Plansza bingo 3x3"></div>
      </div>
    </section>
  </main>

  <!-- WIN MODAL -->
  <div id="modal" class="modal" aria-hidden="true">
    <div class="modalCard" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h2 id="modalTitle">BINGO! 🎉</h2>
      <p class="modalText">Chcesz świętować? Możesz otworzyć film w nowej karcie albo wyświetlić go tutaj.</p>

      <div class="modalActions">
        <button id="openYoutubeBtn" class="btn" type="button">Otwórz film w nowej karcie</button>
        <button id="embedYoutubeBtn" class="btn ghost" type="button">Pokaż film na stronie</button>
        <button id="closeModalBtn" class="btn ghost" type="button">Zamknij</button>
      </div>

      <div id="embedWrap" class="embedWrap" hidden>
        <div class="embedHint">Uwaga: autoplay może być zablokowany przez przeglądarkę. Kliknij ▶️ jeśli trzeba.</div>
        <div class="embed">
          <iframe
            id="ytFrame"
            title="Celebration"
            width="560"
            height="315"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen
          ></iframe>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
